changelog:
  exclude:
    labels:
      - dependencies
    authors:
      - dependabot
      - dependabot[bot]

  categories:
    - title: Breaking Changes
      labels:
        - breaking

    - title: Added
      labels:
        - feature
        - enhancement

    - title: Fixed
      labels:
        - fix
        - bug

    - title: Changed
      labels:
        - refactor
        - improvement

    - title: Documentation
      labels:
        - docs

    - title: Other
      labels:
        - '*'
