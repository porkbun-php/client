name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitattributes'
      - '.gitignore'
      - '.editorconfig'
      - 'examples/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitattributes'
      - '.gitignore'
      - '.editorconfig'
      - 'examples/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.4']
        dependency-version: [prefer-stable, prefer-lowest]
        include:
          - php-version: '8.5'
            dependency-version: prefer-stable
            experimental: true
          - php-version: '8.5'
            dependency-version: prefer-lowest
            experimental: true

    name: PHP ${{ matrix.php-version }} — ${{ matrix.dependency-version }}

    continue-on-error: ${{ matrix.experimental || false }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl, json, mbstring, xml
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php-version }}-${{ matrix.dependency-version }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php-version }}-${{ matrix.dependency-version }}-

      - name: Install dependencies
        run: composer update --${{ matrix.dependency-version }} --no-progress --no-interaction

      - name: Check code style
        if: matrix.dependency-version == 'prefer-stable'
        run: composer run pint

      - name: Run static analysis
        if: matrix.dependency-version == 'prefer-stable'
        run: composer run phpstan

      - name: Check rector
        if: matrix.dependency-version == 'prefer-stable'
        run: composer run rector

      - name: Run tests
        run: vendor/bin/pest

      - name: Run tests with coverage
        if: matrix.php-version == '8.4' && matrix.dependency-version == 'prefer-stable'
        run: vendor/bin/pest --coverage --coverage-clover coverage/clover.xml

      - name: Upload coverage artifact
        if: matrix.php-version == '8.4' && matrix.dependency-version == 'prefer-stable' && always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

