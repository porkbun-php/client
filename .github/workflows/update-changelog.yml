name: Update Changelog

on:
  release:
    types:
      - published

concurrency:
  group: update-changelog
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.target_commitish }}
          fetch-depth: 0

      - name: Guard tag matches branch
        run: |
          TAG="${{ github.event.release.tag_name }}"
          BRANCH="${{ github.event.release.target_commitish }}"
          MAJOR=$(echo "$TAG" | sed 's/^v//' | cut -d. -f1)

          if [[ "$BRANCH" != "main" && "$BRANCH" != "${MAJOR}.x" ]]; then
            echo "::error::Tag $TAG does not belong to branch $BRANCH"
            exit 1
          fi

      - name: Skip if version already in CHANGELOG
        id: check
        run: |
          VERSION=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v//')
          if grep -qF "## [${VERSION}]" CHANGELOG.md; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release date from tag
        if: steps.check.outputs.skip != 'true'
        id: date
        run: |
          date=$(git log -1 --format='%ai' "${{ github.event.release.tag_name }}" | cut -d ' ' -f 1)
          echo "date=$date" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG
        if: steps.check.outputs.skip != 'true'
        uses: stefanzweifel/changelog-updater-action@v1
        with:
          latest-version: ${{ github.event.release.tag_name }}
          release-notes: ${{ github.event.release.body }}
          release-date: ${{ steps.date.outputs.date }}

      - name: Commit updated CHANGELOG
        if: steps.check.outputs.skip != 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update CHANGELOG for ${{ github.event.release.tag_name }}
          file_pattern: CHANGELOG.md
          branch: ${{ github.event.release.target_commitish }}
