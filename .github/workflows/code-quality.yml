name: Code Quality

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitattributes'
      - '.gitignore'
      - '.editorconfig'
      - 'examples/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitattributes'
      - '.gitignore'
      - '.editorconfig'
      - 'examples/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  code-quality:
    runs-on: ubuntu-latest

    name: Pint, PHPStan & Rector

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: curl, json, mbstring, xml
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-8.4-prefer-stable-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-8.4-prefer-stable-

      - name: Install dependencies
        run: composer update --prefer-stable --no-progress --no-interaction

      - name: Check code style
        run: composer run pint

      - name: Run static analysis
        run: composer run phpstan

      - name: Check rector
        run: composer run rector
