name: Code Quality

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'art/**'
      - 'examples/**'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitattributes'
      - '.github/release.yml'
      - '.github/dependabot.yml'
      - '.github/workflows/release.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'art/**'
      - 'examples/**'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitattributes'
      - '.github/release.yml'
      - '.github/dependabot.yml'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    name: Pint, PHPStan & Rector

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup PHP
        uses: shivammathur/setup-php@93cb3149d228516dfca679606c5060ee44f46437 # v2 node24
        with:
          php-version: '8.4'
          extensions: curl, json, mbstring, xml
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-8.4-prefer-stable-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-8.4-prefer-stable-

      - name: Install dependencies
        run: composer update --prefer-stable --no-progress --no-interaction

      - name: Check composer.json normalization
        run: composer run normalize:check

      - name: Check code style
        run: composer run pint

      - name: Run static analysis
        run: composer run phpstan

      - name: Check rector
        run: composer run rector
